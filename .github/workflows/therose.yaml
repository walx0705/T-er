name: therose Auto Renew

on:
  schedule:
  - cron: '0 2 */3 * *'   # 每3天2点运行（UTC）
  workflow_dispatch:

jobs:
  Renew-therose:
    runs-on: ubuntu-latest
    permissions:
      actions: write  
      contents: read
    
    steps:
    - uses: actions/checkout@v6

    # =======================================================
    # 1. 精准拉取：仅将私库根目录下的 therose.py 拉取到 private_repo
    - name: 📥 拉取私库 therose.py
      uses: actions/checkout@v6
      with:
        repository: walx0705/hosting
        token: ${{ secrets.GH_TOKEN }}
        path: private_repo
        sparse-checkout: therose.py
    # =======================================================

    - name: ⚙ 设置 Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: 🛠️ 安装系统依赖和python依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk
        pip install seleniumbase requests
        seleniumbase install chromedriver

    # =======================================================
    # 2. 设置代理（全局环境变量，所有后续步骤和子进程都会继承）
    - name: ⚙ 配置代理
      env:
        NODE_LINK: ${{ secrets.NODE_LINK }}
        PROXY_URL: ${{ secrets.PROXY_URL }}
      run: |
        echo "🔍 检查代理变量是否设置..."
        if [ -z "$PROXY_URL" ]; then
          echo "⚠️ 警告: PROXY_URL 为空，将尝试使用 sing-box 自动配置"
          bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh) || true
        else
          echo "✅ 使用预设代理: $PROXY_URL"
          echo ">>> 设置全局代理环境变量..."
          echo "export http_proxy=$PROXY_URL" >> $GITHUB_ENV
          echo "export https_proxy=$PROXY_URL" >> $GITHUB_ENV
          echo "export HTTP_PROXY=$PROXY_URL" >> $GITHUB_ENV
          echo "export HTTPS_PROXY=$PROXY_URL" >> $GITHUB_ENV
          # 同时设置给 git
          git config --global http.proxy $PROXY_URL
          git config --global https.proxy $PROXY_URL
          # 测试代理
          echo ">>> 测试代理连通性..."
          curl -v --proxy $PROXY_URL -s --max-time 10 https://ifconfig.me || echo "⚠️ 代理测试失败"
        fi

    # =======================================================
    # 3. 运行续期脚本
    - name: 🚀 运行续期脚本
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        PROXY_URL: ${{ secrets.PROXY_URL }}
      run: |
        echo "========================================"
        echo "  📋 代理环境检查"
        echo "========================================"
        echo "PROXY_URL=$PROXY_URL"
        echo "http_proxy=$http_proxy"
        echo "https_proxy=$https_proxy"
        echo "HTTP_PROXY=$HTTP_PROXY"
        echo "HTTPS_PROXY=$HTTPS_PROXY"
        echo "========================================"

        # 用代理测试连通性
        if [ -n "$PROXY_URL" ]; then
          echo ">>> 代理测试 (curl --proxy)..."
          curl --proxy $PROXY_URL -s --max-time 10 ifconfig.me && echo " ✅ 代理正常" || echo " ⚠️ 代理测试失败"
        fi

        echo ">>> 启动浏览器自动化..."
        xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          python3 private_repo/therose.py
    # =======================================================

    # =======================================================
    # 4. 清理旧记录（完全保持您原有的代码逻辑，没有改动）
    - name: 🧹 清理旧的工作流运行记录
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
        count=0
        for run_id in $runs; do
          count=$((count - 1))
          if [ $count -gt 1 ]; then
            echo "删除运行记录: $run_id"
            gh run delete $run_id || true
          fi
        done
    # =======================================================
