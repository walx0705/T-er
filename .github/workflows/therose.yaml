name: therose Auto Renew

on:
  schedule:
  - cron: '0 7 * * *'   # 每天 UTC 7:00 运行（北京时间 15:00 / 下午3点）
  workflow_dispatch:

jobs:
  Renew-therose:
    runs-on: ubuntu-latest
    permissions:
      actions: write  
      contents: read
    
    steps:
    - uses: actions/checkout@v6

    # 1. 精准拉取：仅拉取私库根目录下的 therose.py 这一个文件
    - name: 📥 拉取私库 therose.py
      uses: actions/checkout@v6
      with:
        repository: walx0705/hosting
        token: ${{ secrets.GH_TOKEN }}
        path: private_repo
        sparse-checkout: therose.py

    - name: ⚙ 设置 Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: 🛠️ 安装系统依赖和python依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk
        pip install seleniumbase requests
        seleniumbase install chromedriver

    # =======================================================
    # 🔥 核心修复点 1：动态提取代理地址并跨步骤传递
    - name: ⚙ 设置代理 (sing-box) 并提取代理地址
      continue-on-error: true
      env:
        NODE_LINK: ${{ secrets.NODE_LINK }}
      run: |
        # 运行代理脚本，同时把日志保存到文件，方便从日志提取 socks5 地址
        bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh) | tee proxy_output.log
        
        # 精准提取 PROXY_SERVER 这一行的地址（例如 socks5://127.0.0.1:1080）
        PROXY_SERVER=$(grep -oP "PROXY_SERVER: \K.*" proxy_output.log)
        
        if [ -n "$PROXY_SERVER" ]; then
          echo "✅ 成功提取代理地址: $PROXY_SERVER"
          # 写入全局环境变量，这样下一环节的 Python 就能自动读取并使用代理
          echo "HTTP_PROXY=$PROXY_SERVER" >> $GITHUB_ENV
          echo "HTTPS_PROXY=$PROXY_SERVER" >> $GITHUB_ENV
          echo "ALL_PROXY=$PROXY_SERVER" >> $GITHUB_ENV
        else
          echo "⚠️ 未检测到代理地址，后续将尝试使用直连"
        fi
        rm proxy_output.log
    # =======================================================

    # =======================================================
    # 🔥 核心修复点 2：直接运行，无需再写硬编码代理检测
    - name: 🚀 运行续期脚本
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          python3 private_repo/therose.py
    # =======================================================

    # =======================================================
    # 3. 清理旧的工作流运行记录
    - name: 🧹 清理旧的工作流运行记录
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
        count=0
        for run_id in $runs; do
          count=$((count + 1))
          if [ $count -gt 1 ]; then
            echo "删除运行记录: $run_id"
            gh run delete $run_id || true
          fi
        done
    # =======================================================
