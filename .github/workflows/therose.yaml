name: therose Auto Renew

on:
  schedule:
  - cron: '0 7 * * *'   # 每天 UTC 7:00 运行（北京时间 15:00 / 下午3点）
  workflow_dispatch:

jobs:
  Renew-therose:
    runs-on: ubuntu-latest
    permissions:
      actions: write  
      contents: read
    
    steps:
    - uses: actions/checkout@v6

    # =======================================================
    # 1. 拉取完整私库
    - name: 📥 拉取完整私库
      uses: actions/checkout@v6
      with:
        repository: walx0705/hosting
        token: ${{ secrets.GH_TOKEN }}
        path: private_repo
    # =======================================================

    - name: ⚙ 设置 Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: 🛠️ 安装系统依赖和python依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk
        pip install seleniumbase requests pysocks  # pysocks 是 socks5 代理必装
        seleniumbase install chromedriver

    # =======================================================
    # 2. 设置代理（弃用日志提取，改用系统命令精准抓取端口）
    - name: ⚙ 设置代理 (sing-box) 并自动识别端口
      continue-on-error: true
      env:
        NODE_LINK: ${{ secrets.NODE_LINK }}
      run: |
        # 启动代理 (不管代理脚本返回什么，都强制继续往下走)
        bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh) || true
        
        echo "🔍 正在通过系统进程自动抓取代理端口..."
        # 使用 ss 命令直接看 sing-box 占用了哪个端口，比抓日志精确一万倍
        PORT=$(ss -tlnp 2>/dev/null | grep "sing-box" | grep -oP ":[0-9]+" | head -1 | tr -d ':')
        
        # 兜底机制：如果没抓到，默认用 1080
        if [ -z "$PORT" ]; then
          echo "⚠️ 自动识别端口失败，使用默认端口 1080"
          PORT="1080"
        fi
        
        echo "✅ 成功设置代理端口: $PORT"
        # 写入全局变量，供下一步强制使用
        echo "PROXY_ADDR=socks5://127.0.0.1:$PORT" >> $GITHUB_ENV
    # =======================================================

    # =======================================================
    # 3. 运行续期脚本（强制走代理）
    - name: 🚀 运行续期脚本
      env:
        EMAIL: ${{ secrets.EMAIL }}
        PASSWORD: ${{ secrets.PASSWORD }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        echo "🌐 强制 Python 流量必须走代理：$PROXY_ADDR"
        # 强制注入代理环境变量
        export HTTP_PROXY="$PROXY_ADDR"
        export HTTPS_PROXY="$PROXY_ADDR"
        export ALL_PROXY="$PROXY_ADDR"
        
        # 自动定位脚本位置
        SCRIPT_PATH=$(find private_repo -name "therose.py" | head -1)
        if [ -z "$SCRIPT_PATH" ]; then
          echo "❌ 致命错误：在私库中完全找不到 therose.py 文件！"
          exit 1
        fi
        
        echo "✅ 找到脚本: $SCRIPT_PATH"
        # 启动虚拟显示器跑脚本
        xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
          python3 $SCRIPT_PATH
    # =======================================================

    # =======================================================
    # 4. 清理旧的工作流运行记录
    - name: 🧹 清理旧的工作流运行记录
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
        count=0
        for run_id in $runs; do
          count=$((count + 1))
          if [ $count -gt 1 ]; then
            echo "删除运行记录: $run_id"
            gh run delete $run_id || true
          fi
        done
    # =======================================================
